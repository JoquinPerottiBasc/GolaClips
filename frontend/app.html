<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GolaClips - Subí tu video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .header-credits-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-credits {
      padding: 0.4rem 0.875rem;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px;
      color: #a78bfa;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .header-plan-badge {
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .header-plan-badge.pro {
      background: #f59e0b;
      color: #1a1000;
    }
    .header-upgrade-link {
      font-size: 0.75rem;
      color: #a78bfa;
      text-decoration: none;
      border-bottom: 1px dashed rgba(167,139,250,0.4);
      white-space: nowrap;
    }
    .header-upgrade-link:hover { color: #c4b5fd; border-bottom-color: #c4b5fd; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }
    .modal-card {
      background: #18181f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
      max-width: 380px;
      width: 90%;
    }
    .modal-title {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 1.25rem;
    }
    .quote-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.875rem;
    }
    .quote-row:last-of-type { border-bottom: none; }
    .quote-lbl { color: rgba(238,238,245,0.55); }
    .quote-val { font-weight: 700; }
    .quote-val.insufficient { color: #f43f5e; }
    .quote-alert {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      border-radius: 8px;
      font-size: 0.8rem;
      color: #f87171;
    }
    .quote-alert a { color: #f87171; font-weight: 600; }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }
    .btn-modal-cancel {
      padding: 0.65rem 1.25rem;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(238,238,245,0.6);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-modal-cancel:hover { background: rgba(255,255,255,0.06); }
    .btn-modal-confirm {
      padding: 0.65rem 1.5rem;
      border-radius: 9px;
      background: linear-gradient(135deg, #7c3aed, #22d3ee);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-modal-confirm:hover { opacity: 0.85; }
    .btn-modal-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-brand">
        <a href="index.html"><img src="assets/logo.png" alt="GolaClips" class="logo-img"></a>
        <p class="tagline">Subí tus videos de deportes. La IA encuentra los mejores momentos.</p>
      </div>
      <div class="header-user hidden" id="header-user">
        <div class="header-credits-wrap">
          <span class="header-plan-badge" id="header-plan-badge" style="display:none"></span>
          <span class="header-credits" id="header-credits-display">...</span>
          <a href="#" class="header-upgrade-link" id="header-upgrade-link" style="display:none">Mejorar a Pro</a>
        </div>
        <img id="user-avatar" class="user-avatar" src="" alt="" onerror="this.style.display='none'">
        <span id="user-name" class="user-name"></span>
        <button class="btn-logout" onclick="signOut()">Salir</button>
      </div>
    </header>

    <main>
      <div id="upload-area" class="upload-area">
        <div class="upload-icon">🎬</div>
        <p class="upload-text">Arrastrá tus videos acá</p>
        <p class="upload-sub">o</p>
        <button class="btn-primary" id="btn-elegir">Elegir archivos</button>
        <input type="file" id="file-input" accept="video/*" multiple hidden>
        <p class="upload-hint">MP4, MOV, AVI, MKV · Podés seleccionar varios a la vez</p>
      </div>

      <div id="file-list-section" class="hidden">
        <div id="file-list"></div>
      </div>

      <div id="options-area" class="options-area hidden">
        <div class="option-group">
          <label class="option-label">Duración de clips</label>
          <div class="duration-options">
            <label class="duration-opt">
              <input type="radio" name="duration" value="short">
              <div class="duration-opt-content">
                <span class="duration-name">Cortos</span>
                <span class="duration-range">hasta 30 seg</span>
              </div>
            </label>
            <label class="duration-opt">
              <input type="radio" name="duration" value="medium" checked>
              <div class="duration-opt-content">
                <span class="duration-name">Medios <span class="badge-rec">Recomendado</span></span>
                <span class="duration-range">hasta 1 min</span>
              </div>
            </label>
            <label class="duration-opt">
              <input type="radio" name="duration" value="long">
              <div class="duration-opt-content">
                <span class="duration-name">Largos</span>
                <span class="duration-range">hasta 2 min</span>
              </div>
            </label>
          </div>
        </div>

        <div class="option-group option-row">
          <div class="option-half">
            <label class="option-label" for="num-clips">Cantidad de clips</label>
            <select id="num-clips" class="option-select">
              <option value="auto">IA decide (Recomendado)</option>
              <option value="3">3 clips</option>
              <option value="5">5 clips</option>
              <option value="8">8 clips</option>
              <option value="10">10 clips</option>
            </select>
          </div>
        </div>

        <div class="option-group">
          <label class="option-label" for="custom-prompt">
            ¿Qué momentos querés extraer?
            <span class="option-optional">(opcional)</span>
          </label>
          <textarea
            id="custom-prompt"
            class="option-textarea"
            placeholder="Ej: Solo caídas épicas y trucos imposibles..."
            rows="2"
          ></textarea>
        </div>

        <button class="btn-primary btn-analyze" id="btn-analizar">Analizar ⚡</button>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>

      <div id="jobs-section" class="jobs-section hidden"></div>

      <!-- History section -->
      <div id="history-section" class="history-section hidden">
        <div class="history-header">
          <h2 class="history-title">Tus clips anteriores</h2>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>
    </main>
  </div>

  <!-- Quote confirmation modal -->
  <div id="quote-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-title">Confirmar análisis</div>
      <div id="quote-info"></div>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="dismissQuoteModal()">Cancelar</button>
        <button class="btn-modal-confirm" id="btn-confirm-quote" onclick="confirmQuote()">Analizar ⚡</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="upload.js"></script>
</body>
</html>
